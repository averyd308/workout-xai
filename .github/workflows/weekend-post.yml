name: Weekend Workout Post

on:
  schedule:
    - cron: '0 17 * * 6,0'
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger weekend post endpoint
        run: |
          curl -sf -X GET "${{ secrets.VERCEL_APP_URL }}/api/weekend-cron" \
            -H "x-vercel-cron: 1"
